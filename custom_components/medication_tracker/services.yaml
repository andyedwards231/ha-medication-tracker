    due_times:
      name: Due times
      selector:
        object:
    notes:
      name: Notes
      selector:
        text:
          multiline: true
    weekdays:
      name: Weekdays
      selector:
        object:
    cycle_start_date:
      name: Cycle start date
      selector:
        date:
    cycle_on_days:
      name: Cycle on days
